---
layout: default
title: 搜索
permalink: /search/
---

<div class="search-page-fullscreen">
  <div class="search-top-bar">
    <div class="search-input-group">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="search" id="search-page-input" class="search-page-input" placeholder="搜索..." autocomplete="off" autofocus>
    </div>
    <button type="button" class="search-cancel-btn" id="search-cancel-btn">Cancel</button>
  </div>

  <div class="search-content" id="search-content">
    <div class="popular-tags-section" id="popular-tags-section">
      <h2 class="popular-tags-title">热门标签</h2>
      <div class="popular-tags-list">
        {% for item in site.data.popular_tags %}
          <button type="button" class="popular-tag-chip" data-tag="{{ item.name }}">
            <span class="tag-hash">#</span> {{ item.label | default: item.name | downcase }}
          </button>
        {% endfor %}
      </div>
    </div>

    <div id="search-page-results" class="search-page-results"></div>
  </div>
</div>

<style>
/* Reset some default styles for this page */
.topbar-wrapper, .footer {
  display: none !important;
}

.content-wrapper {
  margin-top: 0 !important;
  padding: 0 !important;
  width: 100% !important;
}

.content-wrapper__inner {
  padding: 0 !important;
  margin: 0 !important;
  max-width: none !important;
}

/* Fullscreen Search Styles */
.search-page-fullscreen {
  min-height: 100vh;
  background-color: #121212;
  color: #e5e7eb;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

.search-top-bar {
  display: flex;
  align-items: center;
  padding: 16px 20px;
  background-color: #1a1a1a;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  position: sticky;
  top: 0;
  z-index: 1000;
}

.search-input-group {
  position: relative;
  flex: 1;
  display: flex;
  align-items: center;
  background-color: #242424;
  border-radius: 10px;
  padding: 0 12px;
}

.search-icon {
  color: #888;
  margin-right: 8px;
  flex-shrink: 0;
}

.search-page-input {
  width: 100%;
  height: 38px;
  background: transparent;
  border: none;
  outline: none;
  color: #fff;
  font-size: 16px;
  padding: 0;
}

.search-page-input::placeholder {
  color: #666;
}

.search-cancel-btn {
  background: transparent;
  border: none;
  color: #b47a74; /* Peach/Reddish color from image */
  font-size: 17px;
  margin-left: 16px;
  padding: 0;
  cursor: pointer;
}

.search-content {
  padding: 32px 24px;
}

.popular-tags-section {
  margin-bottom: 32px;
}

.popular-tags-title {
  font-size: 20px;
  font-weight: 500;
  color: #888;
  margin-bottom: 24px;
}

.popular-tags-list {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
}

.popular-tag-chip {
  background-color: #1e1e1e;
  border: none;
  border-radius: 8px;
  padding: 8px 16px;
  color: #b47a74; /* Peach/Reddish color from image */
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  transition: background-color 0.2s;
}

.popular-tag-chip:hover {
  background-color: #2a2a2a;
}

.tag-hash {
  color: #666;
  margin-right: 4px;
  font-weight: normal;
}

.search-page-results {
  display: flex;
  flex-direction: column;
  gap: 1px;
  background-color: rgba(255, 255, 255, 0.05);
  border-radius: 12px;
  overflow: hidden;
}

.search-page-results:empty {
  display: none;
}

/* Theme adaptation for search results */
.search-result-item {
  display: block;
  padding: 16px;
  background-color: #1a1a1a;
  text-decoration: none;
  color: #fff;
  border-bottom: 1px solid rgba(255, 255, 255, 0.03);
}

.search-result-item:last-child {
  border-bottom: none;
}

.search-result-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 6px;
}

.search-result-meta {
  font-size: 13px;
  color: #888;
  display: flex;
  justify-content: space-between;
}

.search-result-tag {
  background: rgba(180, 122, 116, 0.15);
  color: #b47a74;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
}

.topbar-search-empty {
  padding: 32px;
  text-align: center;
  color: #666;
  background-color: #1a1a1a;
}

/* Hide breadcrumbs and other things that might leak in */
#topbar-breadcrumb, .topbar-breadcrumb {
  display: none !important;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('search-page-input');
  const resultsBox = document.getElementById('search-page-results');
  const popularSection = document.getElementById('popular-tags-section');
  const cancelBtn = document.getElementById('search-cancel-btn');
  const tagChips = document.querySelectorAll('.popular-tag-chip');

  if (!input || !resultsBox || !window.topbarPosts) return;

  const renderResults = (items) => {
    if (!items.length) {
      resultsBox.innerHTML = '<div class="topbar-search-empty">未找到匹配内容</div>';
      popularSection.style.display = 'none';
      return;
    }

    const list = items.map(item => {
      const categories = (item.categories || []).map(cat => `<span class="search-result-tag">${cat}</span>`).join('');
      return `
        <a href="${item.url}" class="search-result-item">
          <div class="search-result-title">${item.title}</div>
          <div class="search-result-meta">
            <span>${item.date}</span>
            <div class="search-result-tags">${categories}</div>
          </div>
        </a>
      `;
    }).join('');

    resultsBox.innerHTML = list;
    popularSection.style.display = 'none';
  };

  const clearResults = () => {
    resultsBox.innerHTML = '';
    popularSection.style.display = 'block';
  };

  input.addEventListener('input', () => {
    const query = input.value.trim().toLowerCase();
    if (query.length === 0) {
      clearResults();
      return;
    }

    const matched = window.topbarPosts.filter(item => {
      const titleMatch = item.title && item.title.toLowerCase().includes(query);
      const categoryMatch = (item.categories || []).some(cat => (cat || '').toLowerCase().includes(query));
      return titleMatch || categoryMatch;
    });

    renderResults(matched);
  });

  cancelBtn.addEventListener('click', () => {
    if (input.value.length > 0) {
      input.value = '';
      clearResults();
      input.focus();
    } else {
      window.history.back();
    }
  });

  tagChips.forEach(chip => {
    chip.addEventListener('click', () => {
      const tag = chip.getAttribute('data-tag');
      input.value = tag;
      input.dispatchEvent(new Event('input'));
    });
  });
});
</script>
